<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Hot Beans Website</title>
    <style>

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background-color: #121212; 
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }


        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal {
            animation: fadeInUp 0.8s ease-out forwards;
        }


        .form-section {
            padding: 60px 20px;
            max-width: 1000px; 
            margin: 0 auto;
        }

        .form-container {
            background: #1e1e1e;
            padding: 50px;
            border-radius: 25px;
            border: 1px solid rgba(209, 163, 163, 0.1);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .full-width { grid-column: span 2; }

        .field { display: flex; flex-direction: column; }

        label {
            color: #d1a3a3;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input, select, textarea {
            background: #121212;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #d1a3a3;
        }

      
        .section-break {
            grid-column: span 2;
            padding-bottom: 10px;
            margin-top: 30px;
            border-bottom: 2px solid #333;
            color: #d1a3a3;
            font-size: 1.2em;
            font-weight: bold;
        }

        .sustain-box {
            background: rgba(209, 163, 163, 0.05);
            padding: 25px;
            border-radius: 15px;
            border: 1px dashed #444;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sustain-box input { width: auto; transform: scale(1.2); cursor: pointer; }

        .create-btn {
            background-color: #d1a3a3;
            color: #121212;
            border: none;
            padding: 20px;
            font-size: 1.1em;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            margin-top: 40px;
            width: 100%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .create-btn:hover {
            background-color: #ffffff;
            transform: translateY(-3px);
        }

        footer {
            background-color: #0a0a0a;
            padding: 40px;
            text-align: center;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title"> 
            <img src="favicon.ico" alt="Icon">
            <div>Hot beans web</div>
        </div>
        <div class="navigation"> 
            <a href="index.html">Home</a>
            <a href="about_us.html">About us</a>
            <a href="careers.html">Careers</a>
            <a href="courses.html">courses</a>
            <a href="projects.html">Projects</a>
            <a href="sign_up.html">Sign Up</a>
        </div>
    </div>

    <section class="form-section reveal">
        <div class="form-container">
            <h2 style="text-align: center; color: #d1a3a3; margin-top: 0; font-size: 2.2em;">Official Application Form</h2>
            
            <form action="#" method="POST">
                <div class="form-grid">
                    
                    <div class="section-break">1. Personal Information</div>
                    <div class="field">
                        <label>First Name</label>
                        <input type="text" placeholder="First Name" required>
                    </div>
                    <div class="field">
                        <label>Last Name</label>
                        <input type="text" placeholder="Last Name" required>
                    </div>
                    <div class="field">
                        <label>Email Address</label>
                        <input type="email" placeholder="email@address.com" required>
                    </div>
                    <div class="field">
                        <label>Contact Number</label>
                        <input type="tel" placeholder="07123 456789">
                    </div>
                    <div class="field full-width">
                        <label>Current Address</label>
                        <input type="text" placeholder="Full Home Address">
                    </div>

                    <div class="section-break">2. Qualifications & Experience</div>
                    <div class="field">
                        <label>Highest Education Level</label>
                        <select required>
                            <option value="none">Secondary School</option>
                            <option value="college">College / A-Levels</option>
                            <option value="university">University Degree</option>
                            <option value="bootcamp">Coding Bootcamp</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Institution Name</label>
                        <input type="text" placeholder="e.g. University of London">
                    </div>
                    <div class="field">
                        <label>Technical Skills (Select Primary)</label>
                        <select>
                            <option value="html-css">HTML5 & CSS3 (Sustainability Focus)</option>
                            <option value="js">JavaScript / TypeScript</option>
                            <option value="python">Python / Django</option>
                            <option value="uiux">UI/UX & Figma</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Years of Coding Experience</label>
                        <input type="number" min="0" max="50" placeholder="0">
                    </div>

                    <div class="section-break">3. Role Choice & Availablity</div>
                    <div class="field">
                        <label>Position Applying For</label>
                        <select required>
                            <option value="trainee">Trainee Developer (6-Month Program)</option>
                            <option value="junior-front">Junior Front-End Developer</option>
                            <option value="junior-back">Junior Back-End Developer</option>
                            <option value="intern">Short-term Internship</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Notice Period</label>
                        <select>
                            <option value="immediate">Available Immediately</option>
                            <option value="1week">1 Week Notice</option>
                            <option value="1month">1 Month Notice</option>
                        </select>
                    </div>
                    <div class="field full-width">
                        <label>Previous Employment / Project History</label>
                        <textarea rows="4" placeholder="Briefly describe your last role or a significant coding project you completed..."></textarea>
                    </div>

                    <div class="section-break">4. Sustainability Profile</div>
                    <div class="field full-width">
                        <label>How do you ensure your code is "Green"?</label>
                        <textarea rows="3" placeholder="Explain your methods for reducing server load and energy consumption..."></textarea>
                    </div>
                    
                    <div class="field full-width">
                        <div class="sustain-box">
                            <input type="checkbox" id="induction_agree" required>
                            <label for="induction_agree" style="margin:0; text-transform:none; color: #ccc;">
                                I confirm I have read the Hot Beans Sustainability induction requirements and agree to the 2-week training period.
                            </label>
                        </div>
                    </div>

                    <div class="section-break">5. Professional Links</div>
                    <div class="field">
                        <label>GitHub Profile</label>
                        <input type="url" placeholder="https://github.com/...">
                    </div>
                    <div class="field">
                        <label>LinkedIn / Portfolio</label>
                        <input type="url" placeholder="https://linkedin.com/in/...">
                    </div>

                </div>

                <button type="submit" class="create-btn">Submit Formal Application</button>
            </form>
        </div>
    </section>

    <footer>
        <p style="color: #666; font-size: 0.8em;">&copy; 2026 Hot Beans Web. All information provided is held under GDPR compliance.</p>
    </footer>

</body>
</html>
